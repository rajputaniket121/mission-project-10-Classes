server.port = 8080

page.size = 5

#Datasource
spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver
spring.datasource.url = jdbc:mysql://localhost:3306/p10
spring.datasource.username= root
spring.datasource.password = root

#Hibernate/JPA
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql= true


#Hibernate dddl
spring.jpa.hibernate.ddl-auto= update
spring.jpa.hibernate.dialect=org.hibernate.dialect.MariaDB53Dialect
spring.jpa.hibernate.current_session_context-class=org.springframework.orm.hibernate.SpringSessionContext
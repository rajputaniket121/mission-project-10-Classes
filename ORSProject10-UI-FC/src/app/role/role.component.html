<div align="center" class="container-fluid px-4 py-2">
    <h1 *ngIf="!form.data.id" align="center" class="text-primary fw-bold mb-2"
        style="margin-bottom: 5px; font-size: 1.8rem;">Add Role</h1>
    <h1 *ngIf="form.data.id>0" align="center" class="text-primary fw-bold mb-2"
        style="margin-bottom: 5px; font-size: 1.8rem;">Update Role</h1>

    <div style="height: auto; margin-bottom: 5px; text-align: center;">
        <div class="text-success" style="margin: 0; font-size: 0.9rem;" *ngIf="!form.error && form.message">{{
            form.message }}</div>
        <div class="text-danger" style="margin: 0; font-size: 0.9rem;" *ngIf="form.error && form.message">{{
            form.message }}</div>
    </div>

    <div class="d-flex justify-content-center">
        <div class="card shadow-sm border-0" style="max-width: 500px; width: 100%;">
            <div class="card-body p-4">
                <table class="table table-borderless mb-0" style="width: 100%;">
                    <tbody>
                        <tr>
                            <th align="left" class="text-secondary fw-bold py-2" style="width: 30%;">Name<span
                                    class="text-danger">*</span></th>
                            <td align="center" class="py-2" style="width: 70%;">
                                <input type="text" name="name" [(ngModel)]="form.data.name"
                                    placeholder="Enter Role Name" class="form-control">
                            </td>
                            <td style="position: fixed; color: red;" class="text-danger small">{{form.inputerror.name}}
                            </td>
                        </tr>

                        <tr>
                            <th align="left" class="text-secondary fw-bold py-2">
                                Description<span class="text-danger">*</span>
                            </th>
                            <td align="center" class="py-2">
                                <textarea style="width: 100%; resize: none;" name="description"
                                    [(ngModel)]="form.data.description" rows="3" placeholder="Enter Short description"
                                    class="form-control">
                                </textarea>
                            </td>
                            <td style="position: fixed; color: red;" class="text-danger small">
                                {{form.inputerror.description}}</td>
                        </tr>

                        <tr>
                            <td colspan="3" class="pt-3">
                                <div class="d-flex gap-2 justify-content-center">
                                    <button (click)="submit()" class="btn btn-primary px-4">
                                        <i class="bi bi-check-circle me-1"></i> Save
                                    </button>
                                    <button (click)="forward('/rolelist')" class="btn btn-outline-secondary px-4">
                                        <i class="bi bi-list me-1"></i> List
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

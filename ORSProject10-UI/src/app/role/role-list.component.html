<div class="d-flex flex-column min-vh-100">
    <div class="container-fluid flex-grow-1 p-4">
        <h1 class="text-center text-light font-weight-bold">Role List</h1>

        <div style="margin-bottom: 10px; text-align: center;">
            <div class="alert alert-success alert-dismissible fade show" role="alert"
                *ngIf="!form.error && form.message">
                {{ form.message }}
                <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="alert alert-danger alert-dismissible fade show" role="alert" *ngIf="form.error && form.message">
                {{ form.message }}
                <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
        </div>

        <div *ngIf="form.list.length > 0">
            <!-- Search Form -->
            <div class="table-responsive bg-light bg-opacity-75 p-3 rounded shadow-sm mb-3">
                <div class="d-flex justify-content-center align-items-center flex-wrap">
                    <div class="mx-2 d-flex align-items-center">
                        <label class="mb-0 me-1 fw-bold">Role:</label>
                        &nbsp;
                        <select class="form-select form-select-sm" name="id" [(ngModel)]="form.searchParams.id"
                            style="width: 180px;">
                            <option value="undefined">--------Select--------</option>
                            <option *ngFor="let obj of form.preload.roleList" [value]="obj.key">{{obj.value}}</option>
                        </select>
                    </div>
                    <div class="mx-2">
                        <button class="btn btn-sm btn-primary" (click)="search()">Search</button>
                        &nbsp;
                        <button class="btn btn-sm btn-outline-secondary" (click)="reset()">Reset</button>
                    </div>
                </div>
            </div>

            <!-- Data Table -->
            <div class="table-responsive">
                <table class="table table-bordered table-hover w-100 text-center bg-white shadow-sm">
                    <thead class="table-light">
                        <tr>
                            <th><input type="checkbox" [(ngModel)]="isMasterSel" (change)="checkUncheckAll($event)" />
                            </th>
                            <th>S.No</th>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Edit</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr align="center" *ngFor="let m of form.list; let i = index">
                            <td><input type="checkbox" #checkboxes (change)="checklistUpdate()" [id]="m.id"
                                    [value]="isMasterSel"></td>
                            <td>{{(form.pageNo*5)+i+ 1}}</td>
                            <td>{{m.name}}</td>
                            <td>{{m.description}}</td>
                            <td><a (click)="forward('/role/' + m.id)" style="cursor: pointer;"
                                    class="text-primary">Edit</a></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination Buttons -->
            <div class="d-flex justify-content-between align-items-center mt-3">
                <div>
                    <button class="btn btn-sm btn-outline-primary" (click)="previous()"
                        [disabled]="form.pageNo == 0">Previous</button>
                </div>
                <div>
                    <button class="btn btn-sm btn-outline-success" (click)="forward('/role')">New</button>
                </div>
                <div>
                    <button class="btn btn-sm btn-outline-danger" (click)="deleteMany()">Delete</button>
                </div>
                <div>
                    <button class="btn btn-sm btn-outline-primary" (click)="next()"
                        [disabled]="form.nextListSize == 0">Next</button>
                </div>
            </div>
        </div>

        <div *ngIf="form.list.length == 0" class="text-center mt-4">
            <button class="btn btn-sm btn-warning" (click)="reset()">Back</button>
        </div>
    </div>
</div>

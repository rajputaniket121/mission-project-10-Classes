<div class="d-flex flex-column min-vh-100">
    <div class="container flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="card shadow-sm w-100" style="max-width: 800px;">
            <div class="card-body py-3">
                <h5 class="text-center text-success fw-bold mb-3">
                    <span *ngIf="!form.data.id">{{ 'Add Role' }}</span>
                    <span *ngIf="form.data.id>0">{{ 'Update Role' }}</span>
                </h5>

                <div class="alert alert-success alert-dismissible fade show" role="alert"
                    *ngIf="!form.error && form.message">
                    {{ form.message }}
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="alert alert-danger alert-dismissible fade show" role="alert"
                    *ngIf="form.error && form.message">
                    {{ form.message }}
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>

                <form>
                    <div class="row">
                        <!-- Name Field -->
                        <div class="col-md-12 mb-2">
                            <label class="form-label"><strong>Name</strong> <span class="text-danger">*</span></label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text"><i class="fa fa-tag text-muted"></i></span>
                                <input type="text" class="form-control" name="name" [(ngModel)]="form.data.name"
                                    placeholder="Enter Role Name">
                            </div>
                            <div class="text-danger small">{{form.inputerror.name}}</div>
                        </div>

                        <!-- Description Field -->
                        <div class="col-md-12 mb-2">
                            <label class="form-label"><strong>Description</strong> <span
                                    class="text-danger">*</span></label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text"><i class="fa fa-align-left text-muted"></i></span>
                                <textarea class="form-control" name="description" [(ngModel)]="form.data.description"
                                    rows="3" placeholder="Enter Short description" style="resize: none;"></textarea>
                            </div>
                            <div class="text-danger small">{{form.inputerror.description}}</div>
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="d-grid gap-2 d-sm-flex justify-content-sm-center mb-2">
                        <button type="button" class="btn btn-success btn-sm px-4" (click)="submit()">Save</button>
                        &nbsp;
                        <button type="button" class="btn btn-secondary btn-sm px-4"
                            (click)="forward('/rolelist')">List</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="d-flex flex-column min-vh-100">
    <div class="container flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="card grad-card shadow-sm w-100" style="max-width: 800px;">
            <div class="card-body py-3">
                <h5 class="text-center text-success fw-bold mb-3">
                    <span *ngIf="!form.data.id">Add Marksheet</span>
                    <span *ngIf="form.data.id>0">Update Marksheet</span>
                </h5>

                <div class="alert alert-success alert-dismissible fade show" role="alert"
                    *ngIf="!form.error && form.message">
                    {{ form.message }}
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="alert alert-danger alert-dismissible fade show" role="alert"
                    *ngIf="form.error && form.message">
                    {{ form.message }}
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>

                <form>
                    <div class="row">
                        <!-- Roll No -->
                        <div class="col-md-6 mb-2">
                            <label class="form-label"><strong>Roll No</strong> <span
                                    class="text-danger">*</span></label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text"><i class="fa fa-id-card text-muted"></i></span>
                                <input type="text" class="form-control" name="rollNo" [(ngModel)]="form.data.rollNo"
                                    maxlength="5" placeholder="Enter Roll No">
                            </div>
                            <div class="text-danger small">{{form.inputerror.rollNo}}</div>
                        </div>

                        <!-- Name (Student) -->
                        <div class="col-md-6 mb-2">
                            <label class="form-label"><strong>Name</strong> <span class="text-danger">*</span></label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text"><i class="fa fa-user text-muted"></i></span>
                                <select class="form-select" name="studentId" [(ngModel)]="form.data.studentId">
                                    <option value="undefined">------------Select------------</option>
                                    <option *ngFor="let obj of form.preload.studentList" [value]="obj.key">{{obj.value}}
                                    </option>
                                </select>
                            </div>
                            <div class="text-danger small">{{form.inputerror.studentId}}</div>
                        </div>

                        <!-- Physics -->
                        <div class="col-md-4 mb-2">
                            <label class="form-label"><strong>Physics</strong> <span
                                    class="text-danger">*</span></label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text"><i class="fa fa-flask text-muted"></i></span>
                                <input type="text" class="form-control" name="physics" [(ngModel)]="form.data.physics"
                                    maxlength="3" placeholder="Enter Physics Marks">
                            </div>
                            <div class="text-danger small">{{form.inputerror.physics}}</div>
                        </div>

                        <!-- Chemistry -->
                        <div class="col-md-4 mb-2">
                            <label class="form-label"><strong>Chemistry</strong> <span
                                    class="text-danger">*</span></label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text"><i class="fa fa-flask text-muted"></i></span>
                                <input type="text" class="form-control" name="chemistry"
                                    [(ngModel)]="form.data.chemistry" maxlength="3" placeholder="Enter Chemistry Marks">
                            </div>
                            <div class="text-danger small">{{form.inputerror.chemistry}}</div>
                        </div>

                        <!-- Maths -->
                        <div class="col-md-4 mb-2">
                            <label class="form-label"><strong>Maths</strong> <span class="text-danger">*</span></label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text"><i class="fa fa-calculator text-muted"></i></span>
                                <input type="text" class="form-control" name="maths" [(ngModel)]="form.data.maths"
                                    maxlength="3" placeholder="Enter Maths Marks">
                            </div>
                            <div class="text-danger small">{{form.inputerror.maths}}</div>
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="d-grid gap-2 d-sm-flex justify-content-sm-center mb-2">
                        <button type="button" class="btn btn-success btn-sm px-4" (click)="submit()">Save</button>
                        &nbsp;
                        <button type="button" class="btn btn-secondary btn-sm px-4"
                            (click)="forward('marksheetlist')">List</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

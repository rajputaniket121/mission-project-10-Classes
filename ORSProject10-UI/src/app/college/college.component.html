<div class="d-flex flex-column min-vh-100">
    <div class="container flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="card grad-card shadow-sm w-100" style="max-width: 800px;">
            <div class="card-body py-3">
                <h5 class="text-center text-success fw-bold mb-3">
                    <span *ngIf="!form.data.id">Add College</span>
                    <span *ngIf="form.data.id>0">Update College</span>
                </h5>

                <div class="alert alert-success alert-dismissible fade show" role="alert"
                    *ngIf="!form.error && form.message">
                    {{ form.message }}
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="alert alert-danger alert-dismissible fade show" role="alert"
                    *ngIf="form.error && form.message">
                    {{ form.message }}
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>

                <form>
                    <div class="row">
                        <!-- Name -->
                        <div class="col-md-12 mb-2">
                            <label class="form-label"><strong>Name</strong> <span class="text-danger">*</span></label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text"><i class="fa fa-university text-muted"></i></span>
                                <input type="text" class="form-control" name="name" [(ngModel)]="form.data.name"
                                    placeholder="Enter College Name">
                            </div>
                            <div class="text-danger small">{{form.inputerror.name}}</div>
                        </div>

                        <!-- Address -->
                        <div class="col-md-12 mb-2">
                            <label class="form-label"><strong>Address</strong> <span
                                    class="text-danger">*</span></label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text"><i class="fa fa-map-marker-alt text-muted"></i></span>
                                <input type="text" class="form-control" name="address" [(ngModel)]="form.data.address"
                                    placeholder="Enter Address">
                            </div>
                            <div class="text-danger small">{{form.inputerror.address}}</div>
                        </div>

                        <!-- State -->
                        <div class="col-md-6 mb-2">
                            <label class="form-label"><strong>State</strong> <span class="text-danger">*</span></label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text"><i class="fa fa-map-marker-alt text-muted"></i></span>
                                <input type="text" class="form-control" name="state" [(ngModel)]="form.data.state"
                                    placeholder="Enter State">
                            </div>
                            <div class="text-danger small">{{form.inputerror.state}}</div>
                        </div>

                        <!-- City -->
                        <div class="col-md-6 mb-2">
                            <label class="form-label"><strong>City</strong> <span class="text-danger">*</span></label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text"><i class="fa fa-city text-muted"></i></span>
                                <input type="text" class="form-control" name="city" [(ngModel)]="form.data.city"
                                    placeholder="Enter City">
                            </div>
                            <div class="text-danger small">{{form.inputerror.city}}</div>
                        </div>

                        <!-- Phone No -->
                        <div class="col-md-12 mb-2">
                            <label class="form-label"><strong>Phone No</strong> <span
                                    class="text-danger">*</span></label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text"><i class="fa fa-phone text-muted"></i></span>
                                <input type="text" class="form-control" name="phoneNo" [(ngModel)]="form.data.phoneNo"
                                    maxlength="10" placeholder="Enter Phone No.">
                            </div>
                            <div class="text-danger small">{{form.inputerror.phoneNo}}</div>
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="d-grid gap-2 d-sm-flex justify-content-sm-center mb-2">
                        <button type="button" class="btn btn-success btn-sm px-4" (click)="submit()">Save</button>
                        &nbsp;
                        <button type="button" class="btn btn-secondary btn-sm px-4"
                            (click)="forward('/collegelist')">List</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="d-flex flex-column min-vh-100">
    <div class="container flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="card grad-card shadow-sm w-100" style="max-width: 800px;">
            <div class="card-body py-3">
                <h5 class="text-center text-success fw-bold mb-3">
                    <span *ngIf="!form.data.id">Add Student</span>
                    <span *ngIf="form.data.id>0">Update Student</span>
                </h5>

                <div class="alert alert-success alert-dismissible fade show" role="alert"
                    *ngIf="!form.error && form.message">
                    {{ form.message }}
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="alert alert-danger alert-dismissible fade show" role="alert"
                    *ngIf="form.error && form.message">
                    {{ form.message }}
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>

                <form>
                    <div class="row">
                        <!-- Enrol No -->
                        <div class="col-md-6 mb-2">
                            <label class="form-label"><strong>Enrol No.</strong> <span
                                    class="text-danger">*</span></label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text"><i class="fa fa-id-card text-muted"></i></span>
                                <input type="text" class="form-control" name="enrolNo" [(ngModel)]="form.data.enrolNo"
                                    placeholder="Enter Enrol No">
                            </div>
                            <div class="text-danger small">{{form.inputerror.enrolNo}}</div>
                        </div>

                        <!-- First Name -->
                        <div class="col-md-6 mb-2">
                            <label class="form-label"><strong>First Name</strong> <span
                                    class="text-danger">*</span></label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text"><i class="fa fa-user text-muted"></i></span>
                                <input type="text" class="form-control" name="firstName"
                                    [(ngModel)]="form.data.firstName" placeholder="Enter First Name">
                            </div>
                            <div class="text-danger small">{{form.inputerror.firstName}}</div>
                        </div>

                        <!-- Last Name -->
                        <div class="col-md-6 mb-2">
                            <label class="form-label"><strong>Last Name</strong> <span
                                    class="text-danger">*</span></label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text"><i class="fa fa-user-circle text-muted"></i></span>
                                <input type="text" class="form-control" name="lastName" [(ngModel)]="form.data.lastName"
                                    placeholder="Enter Last Name">
                            </div>
                            <div class="text-danger small">{{form.inputerror.lastName}}</div>
                        </div>

                        <!-- Email Id -->
                        <div class="col-md-6 mb-2">
                            <label class="form-label"><strong>Email Id</strong> <span
                                    class="text-danger">*</span></label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text"><i class="fa fa-envelope text-muted"></i></span>
                                <input type="text" class="form-control" name="email" [(ngModel)]="form.data.email"
                                    placeholder="Enter Email ID">
                            </div>
                            <div class="text-danger small">{{form.inputerror.email}}</div>
                        </div>

                        <!-- Date of Birth -->
                        <div class="col-md-6 mb-2">
                            <label class="form-label"><strong>Date of Birth</strong> <span
                                    class="text-danger">*</span></label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text"><i class="fa fa-calendar text-muted"></i></span>
                                <input type="date" class="form-control" name="dob" [(ngModel)]="form.data.dob"
                                    [ngModel]="form.data.dob | date:'yyyy-MM-dd'" placeholder="Select Date of Birth">
                            </div>
                            <div class="text-danger small">{{form.inputerror.dob}}</div>
                        </div>

                        <!-- College -->
                        <div class="col-md-6 mb-2">
                            <label class="form-label"><strong>College</strong> <span
                                    class="text-danger">*</span></label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text"><i class="fa fa-university text-muted"></i></span>
                                <select class="form-select" name="collegeId" [(ngModel)]="form.data.collegeId">
                                    <option value="undefined">------------Select------------</option>
                                    <option *ngFor="let obj of form.preload.collegeList" [value]="obj.key">{{obj.value}}
                                    </option>
                                </select>
                            </div>
                            <div class="text-danger small">{{form.inputerror.collegeId}}</div>
                        </div>

                        <!-- Mobile No -->
                        <div class="col-md-6 mb-2">
                            <label class="form-label"><strong>Mobile No</strong> <span
                                    class="text-danger">*</span></label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text"><i class="fa fa-phone text-muted"></i></span>
                                <input type="text" class="form-control" name="phoneNo" [(ngModel)]="form.data.phoneNo"
                                    maxlength="10" placeholder="Enter Mobile No.">
                            </div>
                            <div class="text-danger small">{{form.inputerror.phoneNo}}</div>
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="d-grid gap-2 d-sm-flex justify-content-sm-center mb-2">
                        <button type="button" class="btn btn-success btn-sm px-4" (click)="submit()">Save</button>
                        &nbsp;
                        <button type="button" class="btn btn-secondary btn-sm px-4"
                            (click)="forward('studentlist')">List</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
